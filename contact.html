<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Raft Education Axis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <header class="site-header glass">
    <a class="brand" href="index.html">Raft Education Axis</a>
    <nav>
      <a href="about.html">About Us</a>
      <a href="teachers.html">Teachers</a>
      <a href="courses.html">Courses</a>
      <a class="active" href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="stack">
    <h1 class="page-title">Contact Us</h1>
    <section class="contact-layout">
      <form class="section-card contact-form">
        <label>Name <input type="text" placeholder="Your name" required></label>
        <label>Email <input type="email" placeholder="you@example.com" required></label>
        <label>Message <textarea rows="4" placeholder="How can we help?"></textarea></label>
        <button type="submit" class="btn primary">Send Message</button>
        <div class="quick-links">
          <a href="tel:+919999999999">📞 +91 99999 99999</a>
          <a href="mailto:contact@rafteducationaxis.com">✉️ contact@rafteducationaxis.com</a>
        </div>
      </form>

      <section class="section-card">
        <h2>Find Us</h2>
        <iframe
          class="map"
          src="https://maps.google.com/maps?q=26.5688262,85.5224499&z=16&output=embed"
          loading="lazy"
          title="Patna, Bihar Location"></iframe>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
